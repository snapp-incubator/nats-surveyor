enabled: true

image:
  repository: ghcr.io/snapp-incubator/nats-surveyor
  # Defaults to .Chart.AppVersion (set automatically by the release workflow).
  tag: ""

nats:
  service: ""
  port: 4222
  adminSecret: nats-system-account

auth:
  enabled: true

cluster:
  size: 5

resources:
  requests:
    cpu: 500m
    memory: 500Mi
  limits:
    cpu: 2
    memory: 1Gi

service:
  port: 7777
  name: metrics

prometheus:
  serviceMonitor:
    enabled: true
    interval: 10s
